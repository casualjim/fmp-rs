name: CI Build and Publish

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: rust-builder
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install mise
        uses: https://github.com/jdx/mise-action@v3
        env:
          MISE_GITHUB_TOKEN: ${{ secrets.MISE_GITHUB_TOKEN }}
          CARGO_REGISTRIES_GITEA_TOKEN: "Bearer ${{ secrets.CARGO_REGISTRIES_GITEA_TOKEN }}"
        with:
          experimental: true
          install: true
          cache: true

      - name: Cache Rust dependencies and build outputs
        uses: https://github.com/Swatinem/rust-cache@v2
        with:
          shared-key: fmp-rs-ci
          cache-on-failure: true

      - name: Run tests
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          cargo nextest run --all-features

      - name: Publish to Cargo Registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          CARGO_REGISTRIES_GITEA_TOKEN: "Bearer ${{ secrets.CARGO_REGISTRIES_GITEA_TOKEN }}"
        run: |-
          git config user.name "gitea-actions[bot]"
          git config user.email "gitea-actions[bot]@noreply.lotsa.ai"
          cargo release patch --execute --no-confirm --all-features
