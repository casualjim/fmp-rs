name: CI Build and Publish

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on:
      - docker
      - linux
      - amd64
    container:
      image: ghcr.io/casualjim/rust-builder:24.04-1.91.0-1.3.1-52
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install mise
        uses: https://github.com/jdx/mise-action@v3
        env:
          MISE_GITHUB_TOKEN: ${{ secrets.MISE_GITHUB_TOKEN }}
          CARGO_REGISTRIES_FORGEJO_TOKEN: "Bearer ${{ secrets.CARGO_REGISTRIES_FORGEJO_TOKEN }}"
        with:
          experimental: true
          install: true
          cache: false

      - name: Run tests
        run: |
          cargo nextest run --all-features

      - name: Publish to Cargo Registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          CARGO_REGISTRIES_FORGEJO_TOKEN: "Bearer ${{ secrets.CARGO_REGISTRIES_FORGEJO_TOKEN }}"
        run: |-
          git config user.name "forgejo-actions[bot]"
          git config user.email "forgejo-actions[bot]@noreply.wagyu.icu"
          cargo release patch --execute --no-confirm --all-features
