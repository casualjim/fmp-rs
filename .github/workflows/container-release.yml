name: Container Release

on:
  release:
    types:
      - published

jobs:
  publish-container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: meta
        run: |
          set -euo pipefail
          IMAGE_NAME="ghcr.io/${{ github.repository }}"
          VERSION_TAG="${{ github.event.release.tag_name }}"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "asset_name=fmp-cli-x86_64-unknown-linux-gnu.tar.xz" >> "$GITHUB_OUTPUT"
          TAGS="${IMAGE_NAME}:${VERSION_TAG}"
          if [ "${{ github.event.release.prerelease }}" = "false" ]; then
            TAGS="${TAGS},${IMAGE_NAME}:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Download release artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p dist-download dist
          gh release download "${{ steps.meta.outputs.version_tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "${{ steps.meta.outputs.asset_name }}" \
            --dir dist-download
          tar -xJf "dist-download/${{ steps.meta.outputs.asset_name }}" -C dist-download
          cp dist-download/fmp-cli-*/fmp dist/fmp
          chmod +x dist/fmp

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
